name: Build articles_all.jsonl

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build articles_all.jsonl
        run: python build.py

      - name: Commit updated articles_all.jsonl
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles_all.jsonl
          git diff --staged --quiet || git commit -m "Auto-rebuild articles_all.jsonl"
          git push
